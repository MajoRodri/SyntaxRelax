{% extends 'base.html' %}

{% block title %}SyntaxRelax — Chat{% endblock %}

{% block head %}
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
<script src="{{ url_for('static', filename='js/pdf-utils.js') }}"></script>
<style>
  .nav-badge {
    background: rgba(92,184,196,.12);
    color: var(--teal-dark);
    border: 1px solid rgba(92,184,196,.3);
    border-radius: 2rem;
    padding: .25rem .85rem;
    font-size: .72rem;
    font-weight: 600;
    letter-spacing: .05em;
  }

  /* ── Shell ── */
  .chat-shell {
    display: flex; flex-direction: column;
    height: calc(100vh - 102px - 56px);
    max-width: 660px; margin: 0 auto;
    padding: 0 1rem 1rem;
  }

  /* ── Header ── */
  .chat-head {
    display: flex; align-items: center; gap: .6rem;
    padding: .8rem 0 .55rem;
    border-bottom: 1px solid rgba(92,184,196,.12);
    margin-bottom: .4rem;
  }
  .bot-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: #22c55e;
    box-shadow: 0 0 0 2px rgba(34,197,94,.22);
  }

  /* ── Messages ── */
  .chat-body {
    flex: 1; overflow-y: auto;
    display: flex; flex-direction: column; gap: .5rem;
    padding: .5rem 0 .6rem;
    scroll-behavior: smooth;
  }
  .chat-body::-webkit-scrollbar { width: 3px; }
  .chat-body::-webkit-scrollbar-thumb { background: rgba(92,184,196,.22); border-radius: 2px; }

  .msg { display: flex; max-width: 82%; }
  .msg-bot  { align-self: flex-start; }
  .msg-user { align-self: flex-end; flex-direction: row-reverse; }

  .bubble {
    padding: .6rem .95rem;
    border-radius: 1rem;
    font-size: .87rem; line-height: 1.55;
  }
  .msg-bot  .bubble {
    background: #fff; color: var(--text-main);
    border-bottom-left-radius: .2rem;
    box-shadow: 0 1px 8px rgba(61,90,108,.07);
  }
  .msg-user .bubble {
    background: linear-gradient(135deg, var(--teal-light), var(--teal-dark));
    color: #fff; border-bottom-right-radius: .2rem;
  }

  /* ── Typing dots ── */
  .typing-dots { display: flex; gap: 4px; align-items: center; padding: .6rem .95rem; }
  .typing-dots span {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--teal); opacity: .4;
    animation: tdot 1.2s infinite;
  }
  .typing-dots span:nth-child(2) { animation-delay: .2s; }
  .typing-dots span:nth-child(3) { animation-delay: .4s; }
  @keyframes tdot {
    0%,60%,100% { transform: translateY(0); opacity: .4; }
    30%          { transform: translateY(-5px); opacity: 1; }
  }

  /* ── Result card ── */
  .result-bubble {
    background: #fff; border-radius: 1rem; border-bottom-left-radius: .2rem;
    box-shadow: 0 2px 16px rgba(61,90,108,.09);
    overflow: hidden; width: 100%; max-width: 360px;
  }
  .result-bhead  { padding: .85rem 1.1rem; }
  .result-blabel { font-size: .63rem; font-weight: 700; letter-spacing: .07em; text-transform: uppercase; opacity: .75; margin-bottom: .2rem; }
  .result-bval   { font-size: 1.05rem; font-weight: 800; }
  .result-steps  { padding: .55rem 1.1rem .85rem; }
  .result-step   {
    display: flex; gap: .55rem; align-items: flex-start;
    font-size: .79rem; padding: .38rem 0;
    border-bottom: 1px solid rgba(0,0,0,.05);
    color: var(--text-main);
  }
  .result-step:last-child { border-bottom: none; }
  .rnum {
    width: 20px; height: 20px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: .63rem; font-weight: 800; flex-shrink: 0; margin-top: .1rem;
  }

  .rd .result-bhead { background: linear-gradient(135deg,#fef2f2,#fee2e2); color: #b91c1c; }
  .rd .rnum         { background: #fee2e2; color: #b91c1c; }
  .rw .result-bhead { background: linear-gradient(135deg,#fffbeb,#fef3c7); color: #92400e; }
  .rw .rnum         { background: #fef3c7; color: #92400e; }
  .rs .result-bhead { background: linear-gradient(135deg,rgba(92,184,196,.14),rgba(92,184,196,.26)); color: var(--teal-dark); }
  .rs .rnum         { background: rgba(92,184,196,.2); color: var(--teal-dark); }

  /* ── Input foot ── */
  .chat-foot { padding-top: .55rem; border-top: 1px solid rgba(92,184,196,.1); }
  .chat-input-wrap {
    display: flex; gap: .5rem; align-items: center;
    background: #fff; border: 1.5px solid #d4e4e8;
    border-radius: .85rem; padding: .45rem .55rem .45rem .9rem;
    box-shadow: 0 2px 10px rgba(61,90,108,.06);
    transition: border-color .18s;
  }
  .chat-input-wrap:focus-within { border-color: var(--teal); }
  .chat-input-wrap input {
    flex: 1; border: none; outline: none; background: none;
    font-size: .87rem; color: var(--text-main);
  }
  .btn-send {
    width: 32px; height: 32px; border-radius: 50%;
    background: linear-gradient(135deg, var(--teal-light), var(--teal-dark));
    border: none; color: #fff;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; flex-shrink: 0;
    transition: opacity .18s, transform .15s;
  }
  .btn-send:hover { opacity: .88; transform: scale(1.08); }

  .choice-grid { display: flex; flex-wrap: wrap; gap: .4rem; padding-top: .35rem; justify-content: center; }
  .choice-btn {
    background: #fff; border: 1.5px solid #d4e4e8;
    border-radius: .6rem; padding: .42rem .85rem;
    font-size: .81rem; font-weight: 600; color: var(--text-main);
    cursor: pointer; transition: all .18s;
  }
  .choice-btn:hover { border-color: var(--teal); color: var(--teal); background: rgba(92,184,196,.06); }

  .result-gauge-area {
    padding: .75rem 1rem .4rem;
    display: flex; justify-content: center;
    border-bottom: 1px solid rgba(0,0,0,.06);
  }
  .result-gauge-area canvas { width: 100%; max-width: 320px; height: auto; display: block; }

  .btn-restart {
    display: inline-flex; align-items: center; gap: .4rem;
    background: none; border: 1.5px solid #d4e4e8; border-radius: .6rem;
    padding: .42rem .95rem; font-size: .81rem; font-weight: 600;
    color: var(--text-muted); cursor: pointer; transition: all .18s;
  }
  .btn-restart:hover { border-color: var(--teal); color: var(--teal); }

  .pdf-actions { display: flex; gap: .5rem; flex-wrap: wrap; margin-top: .45rem; }
  .btn-pdf-chat {
    display: inline-flex; align-items: center; gap: .45rem;
    background: linear-gradient(135deg, var(--slate), #2a3f4d);
    color: #fff; border: none; border-radius: .6rem;
    padding: .42rem 1rem; font-size: .8rem; font-weight: 700;
    cursor: pointer; transition: all .18s;
    box-shadow: 0 3px 10px rgba(61,90,108,.25);
  }
  .btn-pdf-chat:hover { opacity: .88; transform: translateY(-1px); }
  .btn-pdf-chat i { color: #f87171; }

  /* ── Probability bars ── */
  .prob-section { padding: .55rem 1.1rem .45rem; border-bottom: 1px solid rgba(0,0,0,.06); }
  .prob-row { display: flex; align-items: center; gap: .5rem; margin-bottom: .32rem; }
  .prob-row:last-child { margin-bottom: 0; }
  .prob-lbl  { font-size: .67rem; font-weight: 700; width: 60px; flex-shrink: 0; color: var(--text-muted); }
  .prob-track { flex: 1; height: 5px; background: #e2eef1; border-radius: 3px; overflow: hidden; }
  .prob-fill  { height: 100%; border-radius: 3px; }
  .prob-fill.success { background: #22c55e; }
  .prob-fill.warning { background: #f59e0b; }
  .prob-fill.danger  { background: #ef4444; }
  .prob-pct  { font-size: .7rem; font-weight: 800; width: 34px; text-align: right; flex-shrink: 0; }

  /* ── Top factors ── */
  .factors-section { padding: .5rem 1.1rem .6rem; border-bottom: 1px solid rgba(0,0,0,.06); }
  .factors-title   { font-size: .63rem; font-weight: 700; letter-spacing: .07em; text-transform: uppercase; color: var(--text-muted); margin-bottom: .38rem; }
  .factor-item     { display: flex; align-items: center; gap: .45rem; padding: .28rem 0; border-bottom: 1px solid rgba(0,0,0,.04); }
  .factor-item:last-child { border-bottom: none; }
  .factor-name { flex: 1; font-size: .78rem; color: var(--text-main); }
  .factor-val  { font-size: .74rem; font-weight: 700; color: var(--text-muted); }
  .factor-icon { font-size: .7rem; font-weight: 800; width: 14px; text-align: center; flex-shrink: 0; }
  .factor-item.danger     .factor-icon { color: #ef4444; }
  .factor-item.protective .factor-icon { color: #22c55e; }
</style>
{% endblock %}

{% block nav_links %}
<div class="d-flex align-items-center gap-2">
  <a href="/" class="nav-link-custom"><span class="es">Inicio</span><span class="en">Home</span></a>
  <span class="nav-badge"><span class="es">Chat Activo</span><span class="en">Chat Active</span></span>
</div>
{% endblock %}

{% block content %}
<div class="container" style="position:relative;z-index:1;">
  <div class="chat-shell">

    <div class="chat-head">
      <img src="{{ url_for('static', filename='icons/neo.png') }}" alt="Neo"
           style="width:42px;height:42px;border-radius:50%;object-fit:cover;border:2.5px solid var(--teal-light);flex-shrink:0;">
      <div style="display:flex;flex-direction:column;gap:.1rem;">
        <span style="font-weight:700;font-size:.88rem;color:var(--slate);">Neo</span>
        <span style="display:flex;align-items:center;gap:.35rem;font-size:.7rem;color:var(--text-muted);">
          <div class="bot-dot"></div>
          <span class="es">en línea</span><span class="en">online</span>
        </span>
      </div>
    </div>

    <div class="chat-body" id="chatBody"></div>
    <div class="chat-foot"  id="chatFoot"></div>

  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
const isEn = () => document.body.classList.contains('lang-en');
const t    = obj  => isEn() ? obj.en : obj.es;

/* ── Pasos de la conversación / Conversation steps ── */
const STEPS = [
  {
    id: 'name', type: 'text',
    msg: { es: '¡Hola! Soy Neo, tu acompañante en este proceso.\nEste es un espacio seguro (tómate el tiempo que necesites).\n¿Cómo te llamas?',
           en: 'Hi! I\'m Neo, here to walk you through this together.\nThis is a safe space (take your time).\nWhat\'s your name?' },
    ph:  { es: 'Tu nombre...', en: 'Your name...' }
  },
  {
    id: 'day_type', type: 'choice',
    msg: { es: 'Encantado/a de conocerte, {nombre}. Voy a analizar cómo fue tu jornada de hoy.\n¿Fue un día de semana o fin de semana?',
           en: 'Great to meet you, {nombre}. I\'m going to analyze how your day went.\nWas it a weekday or a weekend?' },
    opts: [{v:'Weekday',es:'Día de semana',en:'Weekday'},{v:'Weekend',es:'Fin de semana',en:'Weekend'}]
  },
  {
    id: 'sleep_hours', type: 'number',
    msg: { es: 'Bien. Empecemos por el descanso.\n¿Cuántas horas dormiste anoche? (ej: 7 o 6.5)',
           en: 'Good. Let\'s start with rest.\nHow many hours did you sleep last night? (e.g. 7 or 6.5)' },
    ph: { es: 'Horas de sueño...', en: 'Hours of sleep...' },
    min: 0, max: 24, step: 0.5
  },
  {
    id: 'work_hours', type: 'number',
    msg: { es: '¿Cuántas horas dedicaste al trabajo hoy? (ej: 8 o 9.5)',
           en: 'How many hours did you spend working today? (e.g. 8 or 9.5)' },
    ph: { es: 'Horas de trabajo...', en: 'Working hours...' },
    min: 0, max: 24, step: 0.5
  },
  {
    id: 'screen_time_hours', type: 'number',
    msg: { es: '¿Cuántas horas pasaste frente a pantallas en total (trabajo + personal)? (ej: 9)',
           en: 'How many hours were you in front of screens in total (work + personal)? (e.g. 9)' },
    ph: { es: 'Horas de pantalla...', en: 'Screen time hours...' },
    min: 0, max: 24, step: 0.5
  },
  {
    id: 'meetings_count', type: 'number',
    msg: { es: '¿Cuántas reuniones o videollamadas tuviste hoy?',
           en: 'How many meetings or video calls did you have today?' },
    ph: { es: 'Número de reuniones...', en: 'Number of meetings...' },
    min: 0, max: 30, step: 1
  },
  {
    id: 'breaks_taken', type: 'number',
    msg: { es: '¿Cuántos descansos tomaste durante la jornada? (café, paseo, pausa...)',
           en: 'How many breaks did you take during the day? (coffee, walk, pause...)' },
    ph: { es: 'Número de descansos...', en: 'Number of breaks...' },
    min: 0, max: 20, step: 1
  },
  {
    id: 'after_hours_work', type: 'choice',
    msg: { es: '¿Trabajaste fuera de tu horario habitual hoy?',
           en: 'Did you work outside your regular hours today?' },
    opts: [{v:'1',es:'Sí',en:'Yes'},{v:'0',es:'No',en:'No'}]
  },
  {
    id: 'app_switches', type: 'number',
    msg: { es: '¿Cuántas veces aproximadamente cambiaste entre apps o tareas diferentes? (ej: 50)',
           en: 'Roughly how many times did you switch between different apps or tasks? (e.g. 50)' },
    ph: { es: 'Cambios entre apps...', en: 'App switches...' },
    min: 0, max: 300, step: 1
  },
  {
    id: 'task_completion', type: 'number',
    msg: { es: '¿Qué porcentaje de tus tareas planificadas completaste hoy? (0–100)',
           en: 'What percentage of your planned tasks did you complete today? (0–100)' },
    ph: { es: '% completado...', en: '% completed...' },
    min: 0, max: 100, step: 1
  },
  {
    id: 'isolation_index', type: 'choice',
    msg: { es: '¿Cómo describes tu nivel de aislamiento o desconexión social durante el día?',
           en: 'How would you describe your level of social isolation or disconnection today?' },
    opts: [
      {v:'3',es:'Me sentí conectado/a con los demás',en:'I felt connected to others'},
      {v:'5',es:'Tuve momentos de soledad',en:'I had some lonely moments'},
      {v:'6',es:'Estuve bastante solo/a durante el día',en:'I was quite alone during the day'},
      {v:'8',es:'Me sentí muy desconectado/a',en:'I felt very disconnected'},
      {v:'9',es:'Estuve completamente aislado/a',en:'I was completely isolated'}
    ]
  },
  {
    id: 'fatigue_score', type: 'choice',
    msg: { es: 'Ya casi terminamos, {nombre}. ¿Cómo calificarías tu nivel de fatiga al final del día?',
           en: 'Almost done, {nombre}. How would you rate your fatigue level at the end of the day?' },
    opts: [
      {v:'2',es:'Lleno/a de energía, sin cansancio',en:'Full of energy, no tiredness'},
      {v:'4',es:'Un poco cansado/a, pero bien',en:'A bit tired, but okay'},
      {v:'6',es:'Bastante cansado/a al terminar',en:'Quite tired by the end'},
      {v:'8',es:'Muy fatigado/a, me costó seguir',en:'Very fatigued, hard to keep going'},
      {v:'10',es:'Agotado/a, sin energía para nada',en:'Exhausted, no energy left at all'}
    ]
  }
];

const CTA = {
  danger: {
    title: { es: 'Pasos urgentes recomendados', en: 'Urgent recommended steps' },
    steps: [
      { es: 'Habla con RRHH lo antes posible.',          en: 'Talk to HR as soon as possible.' },
      { es: 'Solicita días de descanso o permiso.',      en: 'Request rest days or leave.' },
      { es: 'Busca apoyo profesional de salud mental.',  en: 'Seek professional mental health support.' }
    ]
  },
  warning: {
    title: { es: 'Qué puedes hacer ahora', en: 'What you can do now' },
    steps: [
      { es: 'Conversa con tu supervisor sobre tu carga.',         en: 'Talk to your supervisor about your workload.' },
      { es: 'Establece límites claros fuera del horario.',        en: 'Set clear boundaries outside work hours.' },
      { es: 'Incorpora ejercicio, descanso y tiempo personal.',   en: 'Add exercise, rest and personal time.' }
    ]
  },
  success: {
    title: { es: 'Sigue así (algunos consejos)', en: 'Keep it up (a few tips)' },
    steps: [
      { es: 'Mantén tus hábitos de equilibrio laboral.',      en: 'Keep your work-life balance habits.' },
      { es: 'Comparte prácticas de bienestar con tu equipo.', en: 'Share wellness practices with your team.' },
      { es: 'Vuelve a este test cada mes para monitorear.',   en: 'Return to this test monthly to check in.' }
    ]
  }
};

/* ── Estado / State ── */
let step = 0;
const answers = {};
const body  = document.getElementById('chatBody');
const foot  = document.getElementById('chatFoot');

/* ── Ayudantes DOM / DOM helpers ── */
function scrollBottom() { setTimeout(() => body.scrollTop = body.scrollHeight, 50); }

function addBot(html) {
  const el = document.createElement('div');
  el.className = 'msg msg-bot';
  el.innerHTML = `<div class="bubble">${html}</div>`;
  body.appendChild(el); scrollBottom(); return el;
}

function addBotError(html) {
  const el = document.createElement('div');
  el.className = 'msg msg-bot';
  el.innerHTML = `
    <div class="bubble" style="padding:.6rem .7rem;background:#fff;box-shadow:0 1px 8px rgba(61,90,108,.07);">
      <img src="/static/icons/what.png" alt="Neo dudando"
           style="width:160px;height:160px;object-fit:contain;display:block;margin:0 auto .5rem;">
      <p style="margin:0;font-size:.82rem;color:var(--text-muted);text-align:center;line-height:1.45;">${html}</p>
    </div>`;
  body.appendChild(el); scrollBottom(); return el;
}

function addUser(text) {
  const el = document.createElement('div');
  el.className = 'msg msg-user';
  el.innerHTML = `<div class="bubble">${text}</div>`;
  body.appendChild(el); scrollBottom();
}

function showTyping() {
  const el = document.createElement('div');
  el.className = 'msg msg-bot'; el.id = 'typing';
  el.innerHTML = `<div class="bubble" style="padding:.45rem .8rem;"><div class="typing-dots"><span></span><span></span><span></span></div></div>`;
  body.appendChild(el); scrollBottom();
}
function removeTyping() { document.getElementById('typing')?.remove(); }

/* ── Renderizado de entrada / Input rendering ── */
function renderInput(s) {
  foot.innerHTML = '';
  if (s.type === 'text' || s.type === 'number' || s.type === 'date') {
    const ph = s.ph ? t(s.ph) : '';
    foot.innerHTML = `
      <div class="chat-input-wrap">
        <input id="cin" type="${s.type}"
          ${s.min != null ? `min="${s.min}" max="${s.max}" step="${s.step ?? 'any'}"` : ''}
          placeholder="${ph}" autocomplete="off" />
        <button class="btn-send" onclick="submitText()">
          <i class="bi bi-send-fill" style="font-size:.72rem;"></i>
        </button>
      </div>`;
    const inp = document.getElementById('cin');
    inp.focus();
    inp.addEventListener('keydown', e => { if (e.key === 'Enter') submitText(); });
  } else {
    const btns = s.opts.map(o =>
      `<button class="choice-btn" onclick="submitChoice('${o.v}','${t(o)}')">${t(o)}</button>`
    ).join('');
    foot.innerHTML = `<div class="choice-grid">${btns}</div>`;
  }
}

/* ── Flujo de respuestas / Answer flow ── */
function submitText() {
  const inp = document.getElementById('cin');
  const val = inp?.value.trim();
  if (!val) return;

  const s = STEPS[step];
  if (s.id === 'name') {
    const en = isEn();
    if (!/[a-zA-ZáéíóúüñÁÉÍÓÚÜÑ]/.test(val)) {
      addBotError(en
        ? "That doesn't look like a name 🤔 Could you enter your actual name?"
        : "Eso no parece un nombre 🤔 ¿Puedes escribir tu nombre real?");
      return;
    }
    if (val.length < 2) {
      addBotError(en
        ? "A bit too short! What's your name? 😊"
        : "¡Muy corto! ¿Cómo te llamas? 😊");
      return;
    }
  }
  if (s.type === 'number') {
    const num = parseFloat(val);
    const en = isEn();
    if (isNaN(num)) {
      addBotError(en
        ? "Hmm, I can't quite read that as a number 😅 Try again, I promise I don't bite."
        : "Mmm, eso no me suena a número 😅 Inténtalo de nuevo, que aquí estoy.");
      return;
    }
    if (s.min != null && num < s.min) {
      addBotError(en
        ? `A value below ${s.min}? I think something got mixed up 🤔 Try again.`
        : `¿Un valor menor a ${s.min}? Creo que algo se mezcló 🤔 Inténtalo de nuevo.`);
      return;
    }
    if (s.max != null && num > s.max) {
      const errMsg = (() => {
        if (s.max === 24) return en
          ? `${num} hours?! I wish days were that long too 😄 But we only get 24, what's the real number?`
          : `¿${num} horas?! Ojalá el día tuviera tantas 😄 Pero solo hay 24, ¿cuántas fueron de verdad?`;
        if (s.id === 'task_completion') return en
          ? `${num}%! Percentages only go up to 100 😄 How much did you actually complete?`
          : `¡${num}%! Los porcentajes llegan hasta 100 como máximo 😄 ¿Cuánto completaste realmente?`;
        if (s.id === 'meetings_count') return en
          ? `${num} meetings?! That alone explains everything 😅 Try a number up to ${s.max}.`
          : `¿${num} reuniones?! Eso ya explica todo 😅 Ingresa un número hasta ${s.max}.`;
        if (s.id === 'app_switches') return en
          ? `${num} switches?! You deserve a medal, and a vacation 😄 Max is ${s.max}.`
          : `¿${num} cambios?! Te mereces un premio, y unas vacaciones 😄 El máximo es ${s.max}.`;
        return en
          ? `That's a bit high 🙂 Could you enter a value up to ${s.max}?`
          : `Eso parece un poco alto 🙂 ¿Puedes ingresar hasta ${s.max}?`;
      })();
      addBotError(errMsg);
      return;
    }
  }

  processAnswer(val, val);
}
function submitChoice(val, label) { processAnswer(val, label); }

function processAnswer(val, label) {
  foot.innerHTML = '';
  const s = STEPS[step];
  answers[s.id] = val;
  if (s.type === 'choice') answers[s.id + '_lbl'] = label;
  addUser(label);
  step++;
  if (step < STEPS.length) {
    showTyping();
    setTimeout(() => { removeTyping(); showStep(step); }, 550);
  } else {
    showResult();
  }
}

function showStep(i) {
  const s = STEPS[i];

/* ── Barra de riesgo SVG para la web / Risk bar SVG for web display ── */
function makeBarSVG(score) {
  const W = 320, H = 68, pad = 24, barH = 20, barY = 18, bw = W - pad * 2, r = barH / 2;
  const mx = pad + bw * Math.min(score, 100) / 100;
  const lx = Math.max(pad + r, Math.min(W - pad - r, mx));
  const en = document.body.classList.contains('lang-en');
  const [l1, l2, l3] = en ? ['Low','Moderate','High'] : ['Bajo','Moderado','Alto'];
  const el = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
  el.setAttribute('viewBox', `0 0 ${W} ${H}`);
  el.style.cssText = 'width:100%;max-width:300px;height:auto;display:block;';
  el.innerHTML = `
    <defs><clipPath id="bc"><rect x="${pad}" y="${barY}" width="${bw}" height="${barH}" rx="${r}"/></clipPath></defs>
    <rect x="${pad}" y="${barY}" width="${bw}" height="${barH}" rx="${r}" fill="#e2eef1"/>
    <g clip-path="url(#bc)">
      <rect x="${pad}"            y="${barY}" width="${bw*.33+1}" height="${barH}" fill="#22c55e"/>
      <rect x="${pad+bw*.33}"     y="${barY}" width="${bw*.34+1}" height="${barH}" fill="#f59e0b"/>
      <rect x="${pad+bw*.67}"     y="${barY}" width="${bw*.33+1}" height="${barH}" fill="#ef4444"/>
    </g>
    <circle cx="${mx}" cy="${barY+r}" r="${r}" fill="white" stroke="#3d5a6c" stroke-width="2.5"/>
    <text x="${lx}" y="${barY-5}" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="bold" fill="#3d5a6c">${score}</text>
    <text x="${pad+bw*.165}" y="${barY+barH+14}" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#8b9daa">${l1}</text>
    <text x="${pad+bw*.5}"   y="${barY+barH+14}" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#8b9daa">${l2}</text>
    <text x="${pad+bw*.835}" y="${barY+barH+14}" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#8b9daa">${l3}</text>`;
  return el;
}

/* ── Mostrar resultado / Show result ── */
async function showResult() {
  showTyping();
  await new Promise(r => setTimeout(r, 1100));

  let result;
  try {
    const res = await fetch('/predict_chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(answers)
    });
    result = (await res.json()).result;
  } catch {
    removeTyping();
    addBot(isEn() ? 'I\'m sorry, something went wrong on my end. Could you try again?' : 'Lo siento, algo salió mal de mi parte. ¿Puedes intentarlo de nuevo?');
    foot.innerHTML = `<button class="btn-restart" onclick="location.reload()"><i class="bi bi-arrow-counterclockwise"></i> <span class="es">Reintentar</span><span class="en">Try again</span></button>`;
    return;
  }

  chatResult  = result;
  chatAnswers = { ...answers };

  removeTyping();

  const name = answers.name ? ', ' + answers.name.split(' ')[0] : '';
  const intro = {
    danger:  { es: `Gracias por tu confianza${name}. Los resultados muestran señales importantes que merecen atención. No estás solo/a en esto (hay ayuda disponible), y dar este primer paso ya es algo muy valioso.`,
               en: `Thank you for trusting me${name}. The results show some important signals that deserve attention. You're not alone in this (help is available), and taking this first step already matters a great deal.` },
    warning: { es: `Gracias por compartir esto${name}. Hay algunas señales que vale la pena atender a tiempo. Lo bueno es que estás en un buen momento para cuidarte (pequeños cambios pueden marcar una gran diferencia).`,
               en: `Thank you for sharing this${name}. There are some signals worth addressing early on. The good news is that you're in a good place to take care of yourself now (small changes can make a big difference).` },
    success: { es: `¡Qué bueno saber esto${name}! Tu nivel de riesgo es bajo (lo que estás haciendo está funcionando). Sigue cuidándote, lo estás haciendo muy bien.`,
               en: `Really glad to hear this${name}! Your risk level is low (what you're doing is working). Keep taking care of yourself, you're doing great.` }
  }[result.badge];
  addBot(t(intro));

  const cta  = CTA[result.badge];
  const cls  = { danger:'rd', warning:'rw', success:'rs' }[result.badge];
  const rows = cta.steps.map((s,i) =>
    `<div class="result-step"><span class="rnum">${i+1}</span><span>${t(s)}</span></div>`
  ).join('');

  const gauge = makeBarSVG(result.score);

  // Barras de probabilidad / Probability bars
  const pb = result.proba || {};
  const probSection = `
    <div class="prob-section">
      <div class="prob-row">
        <span class="prob-lbl"><span class="es">Bajo</span><span class="en">Low</span></span>
        <div class="prob-track"><div class="prob-fill success" style="width:${pb.low ?? 0}%"></div></div>
        <span class="prob-pct" style="color:#22c55e">${pb.low ?? 0}%</span>
      </div>
      <div class="prob-row">
        <span class="prob-lbl"><span class="es">Moderado</span><span class="en">Medium</span></span>
        <div class="prob-track"><div class="prob-fill warning" style="width:${pb.medium ?? 0}%"></div></div>
        <span class="prob-pct" style="color:#f59e0b">${pb.medium ?? 0}%</span>
      </div>
      <div class="prob-row">
        <span class="prob-lbl"><span class="es">Alto</span><span class="en">High</span></span>
        <div class="prob-track"><div class="prob-fill danger" style="width:${pb.high ?? 0}%"></div></div>
        <span class="prob-pct" style="color:#ef4444">${pb.high ?? 0}%</span>
      </div>
    </div>`;

  // Factores principales / Top factors
  const factorRows = (result.factors || []).map(f => `
    <div class="factor-item ${f.risk}">
      <span class="factor-name">${isEn() ? f.label_en : f.label_es}</span>
      <span class="factor-val">${f.value}</span>
      <span class="factor-icon">${f.risk === 'danger' ? '↑' : '↓'}</span>
    </div>`).join('');
  const factorsSection = factorRows ? `
    <div class="factors-section">
      <div class="factors-title"><span class="es">Factores principales</span><span class="en">Key factors</span></div>
      ${factorRows}
    </div>` : '';

  const card = document.createElement('div');
  card.className = 'msg msg-bot'; card.style.maxWidth = '88%';
  card.innerHTML = `
    <div class="result-bubble ${cls}">
      <div class="result-gauge-area"></div>
      <div class="result-bhead">
        <div class="result-blabel">${isEn() ? 'Result' : 'Resultado'}</div>
        <div class="result-bval">${result.label}</div>
      </div>
      ${probSection}
      ${factorsSection}
      <div class="result-steps">
        <div style="font-size:.66rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--text-muted);margin-bottom:.45rem;">
          ${t(cta.title)}
        </div>
        ${rows}
      </div>
    </div>`;
  card.querySelector('.result-gauge-area').appendChild(gauge);
  body.appendChild(card); scrollBottom();

  foot.innerHTML = `
    <div class="pdf-actions">
      <button class="btn-pdf-chat" onclick="downloadPDF('es')">
        <i class="bi bi-file-earmark-pdf-fill"></i> Informe PDF — ES
      </button>

        <i class="bi bi-file-earmark-pdf-fill"></i> PDF Report — EN

      <i class="bi bi-arrow-counterclockwise"></i>
      <span class="es">Nuevo test</span><span class="en">New test</span>
    </button>`;
}

  doc.text(t.privacy, m+4, y+6.5); y+=16;

  if (y + 20 > pageH - 20) { addPageDecorated(); y = 20; }
  doc.setFillColor(248,250,252); doc.setDrawColor(210,225,232); doc.setLineWidth(0.3);
  doc.roundedRect(m,y,pageW-m*2,20,2,2,'FD');
  doc.setFont('helvetica','bold'); doc.setFontSize(7.5); doc.setTextColor(92,184,196);
  doc.text(t.notice_title,m+4,y+7);
  doc.setFont('helvetica','normal'); doc.setFontSize(7.5); doc.setTextColor(122,151,166);
  doc.text(t.notice_body,m+4,y+13.5); y+=30;

  // ── Respuestas del test / Test answers ──────────────────────────────────────
  if (y + 60 > pageH - 20) { addPageDecorated(); y = 20; }
  doc.setFont('helvetica','bold'); doc.setFontSize(11); doc.setTextColor(61,90,108);
  doc.text(t.section_answers, m, y);
  doc.setDrawColor(92,184,196); doc.setLineWidth(0.5); doc.line(m,y+2,m+52,y+2); y+=7;

  const rows = [
    ['1',  t.questions[0],  t.day_map[fd.day_type]||fd.day_type||'-'],
    ['2',  t.questions[1],  fd.sleep_hours        ? fd.sleep_hours + ' h'  : '-'],
    ['3',  t.questions[2],  fd.work_hours         ? fd.work_hours + ' h'   : '-'],
    ['4',  t.questions[3],  fd.screen_time_hours  ? fd.screen_time_hours + ' h' : '-'],
    ['5',  t.questions[4],  fd.meetings_count     != null ? String(fd.meetings_count) : '-'],
    ['6',  t.questions[5],  fd.breaks_taken       != null ? String(fd.breaks_taken)   : '-'],
    ['7',  t.questions[6],  t.after_map[fd.after_hours_work]||'-'],
    ['8',  t.questions[7],  fd.app_switches       != null ? String(fd.app_switches)   : '-'],
    ['9',  t.questions[8],  fd.task_completion    != null ? fd.task_completion + ' %' : '-'],
    ['10', t.questions[9],  fd.isolation_index_lbl||fd.isolation_index||'-'],
    ['11', t.questions[10], fd.fatigue_score_lbl  ||fd.fatigue_score  ||'-']
  ];
  doc.autoTable({
    startY:y, margin:{left:m,right:m},
    head:[[t.col_q,t.col_question,t.col_answer]],
    body:rows,
    styles:{fontSize:9,cellPadding:{top:4,bottom:4,left:4,right:4},valign:'middle',font:'helvetica'},
    headStyles:{fillColor:[92,184,196],textColor:255,fontStyle:'bold'},
    columnStyles:{0:{cellWidth:10,halign:'center',fontStyle:'bold',textColor:[61,90,108]},1:{cellWidth:117},2:{cellWidth:47,fontStyle:'bold',textColor:[58,154,170]}},
    alternateRowStyles:{fillColor:[240,248,250]},
    tableLineColor:[210,230,235],tableLineWidth:0.3
  });
  y = doc.lastAutoTable.finalY+12;


  if (y+44>pageH-16) { addPageDecorated(); y=20; }

  // About
  doc.setFillColor(237,248,250); doc.setDrawColor(92,184,196); doc.setLineWidth(0.4);
  doc.roundedRect(m,y,pageW-m*2,40,3,3,'FD');
  doc.setFillColor(92,184,196); doc.rect(m,y+3,3,34,'F');
  const adims = logoDims(logo,13);
  if (logoUrl) doc.addImage(logoUrl,'PNG',m+7,y+6,adims.w,adims.h);
  const ix = logoUrl?m+7+adims.w+4:m+8;
  doc.setFont('helvetica','bold'); doc.setFontSize(9.5); doc.setTextColor(61,90,108);
  doc.text(t.about_title,ix,y+11);
  doc.setFont('helvetica','normal'); doc.setFontSize(7.5); doc.setTextColor(90,120,140);
  t.about_lines.forEach((line,i) => doc.text(line,ix,y+19+i*5));
  doc.setFontSize(7); doc.setTextColor(140,175,190);
  doc.text(t.footer_team,m+7,y+37);

  // Footer
  doc.setDrawColor(200,225,232); doc.setLineWidth(0.3); doc.line(m,pageH-14,pageW-m,pageH-14);
  doc.setFont('helvetica','normal'); doc.setFontSize(7); doc.setTextColor(170,198,208);
  const fdims = logoDims(logo,5);
  if (logoUrl) {
    const copyW = doc.getTextWidth(t.footer_copy);
    const fgx = (pageW - fdims.w - 3 - copyW) / 2;
    doc.addImage(logoUrl,'PNG', fgx, pageH-11, fdims.w, fdims.h);
    doc.text(t.footer_copy, fgx + fdims.w + 3, pageH-8);
  } else {
    doc.text(t.footer_copy, pageW/2, pageH-8, {align:'center'});
  }

  doc.save(t.file_prefix+new Date().toISOString().slice(0,10)+'.pdf');
}

/* ── Start ── */
setTimeout(() => showStep(0), 350);
</script>
{% endblock %}
